<!DOCTYPE html>
<html>
<head>
<title>Social Mood Matcher</title>
</head>

<body>

<h1>Social Mood Matcher</h1>

<input id="text" placeholder="How do you feel today?">
<button onclick="send()">Check Mood</button>

<p id="result"></p>

<script>

async function send(){

let text = document.getElementById("text").value;

let response = await fetch("http://localhost:8000");

let data = await response.json();

document.getElementById("result").innerText = JSON.stringify(data);

}

</script>

</body>
</html>
